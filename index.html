<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stream - 4K Ultra HD</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --red: #ff3b3b; 
            --bg: #000;
            --surface: #121212;
            --surface-light: #1e1e1e;
            --text: #fff;
            --text-secondary: #b0b0b0;
            --border: #2a2a2a;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .app { 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* Video container */
        .video-container { 
            flex: 1; 
            position: relative; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }
        
        video { 
            width: 100%; 
            height: auto; 
            max-height: 100%; 
            background: #000;
        }
        
        /* Status bar - superior */
        .status-bar { 
            position: absolute; 
            top: clamp(12px, 4vh, 16px); 
            left: clamp(12px, 4vw, 16px); 
            right: clamp(12px, 4vw, 16px); 
            display: flex; 
            justify-content: space-between; 
            pointer-events: none; 
            z-index: 10;
        }
        
        .badge { 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: clamp(8px, 2vh, 10px) clamp(16px, 4vw, 20px); 
            border-radius: 30px; 
            font-size: clamp(13px, 3.5vw, 15px); 
            border: 1px solid var(--border); 
            pointer-events: auto;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        /* Video controls overlay - MOVIDO 200px HACIA ARRIBA */
        .video-controls {
            position: absolute;
            bottom: 200px; /* Movido hacia arriba desde bottom: 20px */
            left: clamp(16px, 4vw, 20px);
            right: clamp(16px, 4vw, 20px);
            background: rgba(18,18,18,0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: clamp(14px, 3vh, 18px) clamp(18px, 4vw, 22px);
            display: flex;
            align-items: center;
            gap: clamp(12px, 3vw, 16px);
            border: 2px solid var(--red);
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 20;
            box-shadow: 0 4px 20px rgba(255,59,59,0.2);
        }
        
        .video-controls.visible {
            opacity: 1;
        }
        
        .control-btn {
            width: clamp(48px, 11vw, 52px);
            height: clamp(48px, 11vw, 52px);
            border-radius: 30px;
            background: var(--surface-light);
            border: 2px solid var(--border);
            color: var(--text);
            font-size: clamp(22px, 5.5vw, 24px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        .control-btn:active {
            background: var(--red);
            border-color: var(--red);
            transform: scale(0.9);
        }
        
        .progress-area {
            flex: 1;
            display: flex;
            align-items: center;
            gap: clamp(10px, 2.5vw, 14px);
        }
        
        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--red);
            border-radius: 3px;
            width: 0%;
            position: relative;
        }
        
        .progress-handle {
            width: 16px;
            height: 16px;
            border-radius: 8px;
            background: #fff;
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: opacity 0.2s;
            border: 2px solid var(--red);
        }
        
        .progress-bar:active .progress-handle {
            opacity: 1;
        }
        
        .time {
            color: var(--text);
            font-size: clamp(14px, 3.8vw, 16px);
            font-weight: 600;
            min-width: 90px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        
        /* Toolbar inferior */
        .toolbar { 
            background: var(--surface); 
            padding: clamp(16px, 4vh, 20px) clamp(12px, 3vw, 14px) calc(clamp(25px, 6vh, 30px) + env(safe-area-inset-bottom, 0px)); 
            display: flex; 
            gap: clamp(10px, 2.5vw, 12px); 
            border-top: 2px solid var(--border);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.7);
        }
        
        .btn { 
            flex: 1; 
            padding: clamp(16px, 4.5vh, 18px) clamp(10px, 2.5vw, 12px); 
            border: none; 
            border-radius: 36px; 
            background: var(--surface-light); 
            color: var(--text); 
            font-weight: 700; 
            font-size: clamp(15px, 4.2vw, 16px);
            letter-spacing: 0.3px;
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 2px solid var(--border);
        }
        
        .btn:active { 
            transform: scale(0.96); 
            background: #2a2a2a;
        }
        
        .btn-main { 
            background: var(--red); 
            border: none;
            box-shadow: 0 4px 15px rgba(255, 59, 59, 0.4);
        }
        
        .btn-main:active {
            background: #ff1f1f;
        }
        
        /* Panel de invitación */
        .panel { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
            padding: 20px; 
        }
        
        .panel.active { 
            display: flex; 
        }
        
        .panel-content { 
            background: var(--surface); 
            padding: clamp(28px, 7vh, 36px) clamp(24px, 6vw, 28px); 
            border-radius: 40px; 
            width: min(90%, 400px); 
            text-align: center; 
            border: 2px solid var(--red);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }
        
        .panel-content h3 {
            font-size: clamp(22px, 5.5vw, 24px);
            margin-bottom: 25px;
            color: var(--text);
        }
        
        .panel-content input { 
            width: 100%; 
            padding: clamp(18px, 4.5vh, 20px); 
            margin: 20px 0; 
            background: var(--surface-light); 
            color: var(--text); 
            border: 2px solid var(--border); 
            border-radius: 36px; 
            font-size: clamp(15px, 4.2vw, 16px);
            text-align: center;
            font-weight: 500;
        }
        
        .panel-content input:focus {
            outline: none;
            border-color: var(--red);
        }
        
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: clamp(100px, 20vh, 120px);
            left: 20px;
            right: 20px;
            background: var(--surface);
            border: 2px solid var(--red);
            border-radius: 40px;
            padding: 18px 24px;
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            z-index: 200;
            display: none;
            animation: slideUp 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Loading indicator */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
            z-index: 5;
        }
        
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        /* Safe area para notches */
        @supports (padding: max(0px)) {
            .toolbar {
                padding-bottom: max(clamp(25px, 6vh, 30px), env(safe-area-inset-bottom));
            }
        }
        
        /* Touch feedback */
        .btn, .control-btn {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        
        /* Audio compat badge */
        .audio-badge {
            position: absolute;
            top: 70px;
            right: 16px;
            background: rgba(255,59,59,0.9);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            z-index: 15;
            border: 1px solid #ff6b6b;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="video-container" id="videoContainer">
        <video id="v" playsinline webkit-playsinline></video>
        
        <!-- Loading indicator -->
        <div class="loading" id="loading"></div>
        
        <!-- Status badges -->
        <div class="status-bar">
            <div class="badge" id="status">🆔 Iniciando...</div>
            <div class="badge" id="mode">📱 Receptor</div>
        </div>
        
        <!-- Audio compatibility badge -->
        <div class="audio-badge" id="audioBadge">🔊 5.1 / 7.1 / Estéreo</div>
        
        <!-- Video controls overlay - MOVIDO 200px HACIA ARRIBA -->
        <div class="video-controls" id="videoControls">
            <button class="control-btn" onclick="togglePlay()" id="playPauseBtn">▶️</button>
            <button class="control-btn" onclick="toggleMute()" id="muteBtn">🔊</button>
            <div class="progress-area">
                <div class="progress-bar" onclick="seek(event)" id="progressBar">
                    <div class="progress-fill" id="progressFill">
                        <div class="progress-handle" id="progressHandle"></div>
                    </div>
                </div>
                <span class="time" id="timeDisplay">0:00 / 0:00</span>
            </div>
            <button class="control-btn" onclick="toggleFullscreen()">⛶</button>
        </div>
    </div>

    <!-- Bottom toolbar -->
    <div class="toolbar">
        <button class="btn btn-main" onclick="document.getElementById('file').click()">📁 Emitir 4K</button>
        <button class="btn" onclick="showInvite()">👥 Invitar</button>
        <button class="btn" onclick="toggleMute()">🔇/🔊</button>
    </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file" hidden accept="video/*" onchange="startBroadcasting(event)">

<!-- Invite panel -->
<div id="invitePanel" class="panel" onclick="this.classList.remove('active')">
    <div class="panel-content" onclick="event.stopPropagation()">
        <h3>🔗 Invitar amigos</h3>
        <input type="text" id="linkField" readonly onclick="this.select()">
        <button class="btn btn-main" style="width:100%; margin-bottom: 12px;" onclick="copyLink()">📋 Copiar link</button>
        <button class="btn" style="width:100%" onclick="document.getElementById('invitePanel').classList.remove('active')">Cerrar</button>
    </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
    // Elementos DOM
    const v = document.getElementById('v');
    const videoContainer = document.getElementById('videoContainer');
    const videoControls = document.getElementById('videoControls');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const progressFill = document.getElementById('progressFill');
    const timeDisplay = document.getElementById('timeDisplay');
    const statusEl = document.getElementById('status');
    const modeEl = document.getElementById('mode');
    const loadingEl = document.getElementById('loading');
    const toast = document.getElementById('toast');
    const audioBadge = document.getElementById('audioBadge');

    // Variables de estado
    let peer, conns = [], myStream = null;
    let controlsTimeout = null;
    let audioContext = null;
    let audioSource = null;

    // Inicialización
    function init() {
        peer = new Peer();
        
        peer.on('open', id => {
            statusEl.innerText = "🆔 " + id.substring(0,6);
            document.getElementById('linkField').value = window.location.origin + window.location.pathname + "#" + id;
            
            if(window.location.hash) {
                connectToHost(window.location.hash.substring(1));
            }
            showToast('✅ Sala creada - Comparte el link');
        });

        // Receptor: Escuchar llamadas de video
        peer.on('call', call => {
            console.log("📞 Recibiendo señal de video...");
            showLoading(true);
            
            call.answer(); 
            call.on('stream', remoteStream => {
                v.srcObject = remoteStream;
                
                // Mejorar compatibilidad de audio
                v.muted = false; // Intentar con audio primero
                
                v.play()
                    .then(() => {
                        modeEl.innerText = "🎬 Viendo 4K";
                        showLoading(false);
                        showToast('📺 Conectado al stream');
                        
                        // Detectar tipo de audio
                        detectAudioTracks();
                    })
                    .catch(e => {
                        console.log("Error autoplay con audio:", e);
                        // Si falla, silenciar y reproducir
                        v.muted = true;
                        v.play()
                            .then(() => {
                                modeEl.innerText = "🎬 Viendo (sin audio)";
                                showToast('🔇 Audio silenciado - Toca para activar');
                                showLoading(false);
                            })
                            .catch(e2 => {
                                showToast('👆 Toca el video para reproducir');
                                showLoading(false);
                            });
                    });
            });
            
            call.on('error', err => {
                console.error('Call error:', err);
                showToast('❌ Error en la conexión');
                showLoading(false);
            });
        });

        peer.on('connection', c => setupData(c));
        peer.on('error', err => {
            console.error('Peer error:', err);
            showToast('❌ Error de conexión');
        });
        
        // Configurar eventos del video
        setupVideoListeners();
    }

    // Configurar listeners del video
    function setupVideoListeners() {
        v.addEventListener('timeupdate', updateProgress);
        v.addEventListener('loadedmetadata', () => {
            updateTimeDisplay();
            if (v.videoWidth) {
                modeEl.innerText = `🎬 ${v.videoWidth}x${v.videoHeight}`;
                if (v.videoWidth >= 3840) {
                    modeEl.innerText += ' 4K Ultra HD';
                }
            }
            detectAudioTracks();
        });
        v.addEventListener('play', () => {
            playPauseBtn.innerHTML = '⏸️';
            showControls();
        });
        v.addEventListener('pause', () => {
            playPauseBtn.innerHTML = '▶️';
            showControls();
        });
        v.addEventListener('volumechange', () => {
            muteBtn.innerHTML = v.muted ? '🔇' : '🔊';
        });
        v.addEventListener('error', (e) => {
            console.error('Video error:', e);
            showToast('❌ Error en el video - Probando otro formato');
        });
        
        // Mostrar/ocultar controles
        videoContainer.addEventListener('mousemove', showControls);
        videoContainer.addEventListener('touchstart', showControls);
        videoContainer.addEventListener('click', toggleControls);
    }

    // Detectar pistas de audio para compatibilidad
    function detectAudioTracks() {
        if (v.audioTracks && v.audioTracks.length > 0) {
            const tracks = v.audioTracks;
            let audioInfo = '🔊 ';
            for (let i = 0; i < tracks.length; i++) {
                if (i > 0) audioInfo += ' / ';
                audioInfo += tracks[i].label || `Pista ${i+1}`;
            }
            audioBadge.innerText = audioInfo;
            audioBadge.style.background = 'rgba(255,59,59,0.9)';
        } else {
            audioBadge.innerText = '🔊 Audio compatible';
        }
    }

    // Funciones de control de video
    function showControls() {
        videoControls.classList.add('visible');
        clearTimeout(controlsTimeout);
        
        if (!v.paused) {
            controlsTimeout = setTimeout(() => {
                videoControls.classList.remove('visible');
            }, 3000);
        }
    }
    
    function toggleControls() {
        if (videoControls.classList.contains('visible')) {
            videoControls.classList.remove('visible');
            clearTimeout(controlsTimeout);
        } else {
            showControls();
        }
    }

    function togglePlay() {
        if (v.paused) {
            v.play();
        } else {
            v.pause();
        }
        
        // Sincronizar con otros peers
        conns.forEach(c => c.open && c.send({type:'cmd', play: !v.paused}));
    }

    function toggleMute() {
        v.muted = !v.muted;
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            if (videoContainer.requestFullscreen) {
                videoContainer.requestFullscreen();
            } else if (videoContainer.webkitRequestFullscreen) {
                videoContainer.webkitRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        }
    }

    function seek(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const pos = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        v.currentTime = pos * v.duration;
        showControls();
    }

    function updateProgress() {
        if (v.duration) {
            const percent = (v.currentTime / v.duration) * 100;
            progressFill.style.width = percent + '%';
            updateTimeDisplay();
        }
    }

    function updateTimeDisplay() {
        const current = formatTime(v.currentTime);
        const total = formatTime(v.duration);
        timeDisplay.textContent = `${current} / ${total}`;
    }

    function formatTime(seconds) {
        if (isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Funciones de broadcasting
    function startBroadcasting(e) {
        const file = e.target.files[0];
        if(!file) return;
        
        showLoading(true);
        
        // Limpiar stream anterior
        if (myStream) {
            myStream.getTracks().forEach(t => t.stop());
        }
        
        v.srcObject = null;
        v.src = URL.createObjectURL(file);
        
        v.onloadedmetadata = () => {
            v.play()
                .then(() => {
                    modeEl.innerText = "📡 Emisor 4K";
                    showToast('🎥 Transmitiendo video');
                    
                    // Capturar stream con mayor calidad
                    myStream = v.captureStream ? v.captureStream(30) : v.mozCaptureStream(30);
                    
                    // Mejorar calidad de audio en el stream
                    if (myStream.getAudioTracks().length > 0) {
                        const audioTrack = myStream.getAudioTracks()[0];
                        try {
                            audioTrack.applyConstraints({
                                autoGainControl: false,
                                echoCancellation: false,
                                noiseSuppression: false
                            });
                        } catch (e) {}
                    }
                    
                    // Llamar a todos los peers conectados
                    conns.forEach(c => {
                        if(c.open) peer.call(c.peer, myStream);
                    });
                    
                    detectAudioTracks();
                    showLoading(false);
                })
                .catch(err => {
                    console.error('Error playing:', err);
                    showToast('❌ Error al reproducir - Probando modo compatible');
                    
                    // Intentar con configuración de audio alternativa
                    v.volume = 1.0;
                    v.muted = false;
                    v.play()
                        .then(() => {
                            modeEl.innerText = "📡 Emisor (modo compatible)";
                            showToast('✅ Reproduciendo en modo compatible');
                            showLoading(false);
                        })
                        .catch(e2 => {
                            showToast('❌ Formato no soportado');
                            showLoading(false);
                        });
                });
        };
        
        v.onerror = () => {
            showToast('❌ Error al cargar el video');
            showLoading(false);
        };
    }

    // Funciones de conexión
    function connectToHost(hostId) {
        showLoading(true);
        const c = peer.connect(hostId);
        setupData(c);
    }

    function setupData(c) {
        c.on('open', () => {
            conns.push(c);
            modeEl.innerText = "🔗 Conectando...";
            
            if(myStream) {
                peer.call(c.peer, myStream);
                modeEl.innerText = "📡 Emisor";
            }
            
            showLoading(false);
            showToast('✅ Conectado a la sala');
        });
        
        c.on('data', d => {
            if(d.type === 'cmd') {
                d.play ? v.play() : v.pause();
            }
        });
        
        c.on('error', err => {
            console.error('Connection error:', err);
            showToast('❌ Error de conexión');
            showLoading(false);
        });
        
        c.on('close', () => {
            conns = conns.filter(conn => conn.peer !== c.peer);
            showToast('👋 Un usuario se desconectó');
        });
    }

    // Funciones UI
    function showInvite() { 
        document.getElementById('invitePanel').classList.add('active'); 
    }
    
    function copyLink() {
        const f = document.getElementById('linkField');
        f.select();
        f.setSelectionRange(0, 99999);
        document.execCommand('copy');
        
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = '✅ Copiado!';
        setTimeout(() => {
            btn.innerText = originalText;
        }, 1500);
        
        showToast('📋 Link copiado al portapapeles');
    }
    
    function showToast(message) {
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }
    
    function showLoading(show) {
        loadingEl.style.display = show ? 'block' : 'none';
    }

    // Inicializar app
    window.onload = init;
</script>
</body>
</html>
